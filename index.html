<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sun Tap: Свет мира</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: radial-gradient(circle, #1a1a2e 0%, #000 100%); color: white; text-align: center; font-family: sans-serif; overflow: hidden; margin: 0; padding: 0; height: 100vh; }
        .page { display: none; padding: 20px; height: calc(100vh - 80px); overflow-y: auto; }
        .page.active { display: block; }
        #score { font-size: 48px; font-weight: bold; margin-top: 40px; color: #ffeb3b; text-shadow: 0 0 20px rgba(255, 235, 59, 0.5); }
        #sun { font-size: 140px; cursor: pointer; user-select: none; transition: transform 0.1s; display: inline-block; margin-top: 40px; filter: drop-shadow(0 0 30px #ff9800); -webkit-tap-highlight-color: transparent; }
        #sun:active { transform: scale(1.15); }
        .task-card { background: rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-action { background: #ffeb3b; color: #000; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(20, 20, 20, 0.9); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; backdrop-filter: blur(10px); }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; cursor: pointer; transition: 0.3s; text-align: center; }
        .nav-item.active { color: #ffeb3b; transform: translateY(-5px); }
        .nav-icon { font-size: 24px; display: block; }
        .plus-one { position: absolute; color: #fff; font-size: 28px; font-weight: bold; animation: moveUp 0.8s ease-out forwards; pointer-events: none; text-shadow: 0 0 10px #ffeb3b; }
        @keyframes moveUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-150px); } }
    </style>
</head>
<body>
    <div id="game-page" class="page active">
        <div id="score">0</div>
        <div id="sun">☀️</div>
        <p>Умножай свет каждым касанием</p>
    </div>
    <div id="tasks-page" class="page">
        <h2>Добрые дела</h2>
        <div class="task-card"><span>Подписаться на канал</span><button class="btn-action">+500☀️</button></div>
        <div class="task-card"><span>Пригласить друга</span><button class="btn-action">+1000☀️</button></div>
    </div>
    <div id="wallet-page" class="page">
        <h2>Мой свет</h2>
        <button class="btn-action" style="margin-top: 20px;">Подключить Кошелек</button>
    </div>
    <nav>
        <div class="nav-item active" onclick="showPage('game-page', this)"><span class="nav-icon">☀️</span>Игра</div>
        <div class="nav-item" onclick="showPage('tasks-page', this)"><span class="nav-icon">📜</span>Задания</div>
        <div class="nav-item" onclick="showPage('wallet-page', this)"><span class="nav-icon">💎</span>Кошелек</div>
    </nav>
    <script>
        let count = 0;
        const tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('sun').addEventListener('touchstart', (e) => {
            e.preventDefault();
            count++;
            document.getElementById('score').innerText = count;
            tg.HapticFeedback.impactOccurred('medium');
            const plus = document.createElement('div');
            plus.innerText = '+1';
            plus.className = 'plus-one';
            plus.style.left = e.touches[0].clientX + 'px';
            plus.style.top = e.touches[0].clientY + 'px';
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 800);
        });
        function showPage(pageId, navEl) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            navEl.classList.add('active');
        }
    </script>
</body>
</html>
